  /request:
    get:
      description: Push request and get ident
      operationId: pushRequest
      parameters:
      - description: Type of data to export
        explode: true
        in: query
        name: service
        required: true
        schema:
          $ref: "#/components/schemas/Services"
        style: form
      - description: Optional URL to send response
        explode: true
        in: query
        name: feedback-url
        required: false
        schema:
          example: http://localhost
          format: url
          type: string
        style: form
      - description: Period start date in yyyy-MM-dd'T'HH:mm:ss format (or short yyyy-MM-dd
          to API requests)
        explode: true
        in: query
        name: date-from
        required: false
        schema:
          format: date-time
          pattern: yyyy-MM-dd'T'HH:mm:ss
          type: string
        style: form
      - description: Period finish date in yyyy-MM-dd'T'HH:mm:ss format (or short
          yyyy-MM-dd to API requests)
        explode: true
        in: query
        name: date-to
        required: false
        schema:
          format: date-time
          pattern: yyyy-MM-dd'T'HH:mm:ss
          type: string
        style: form
      - description: "Invoice number for PRODUCT_RECEIVE_CONFIRMATION, MOVEMENTS,\
          \ PRODUCT_OUTGO_CONFIRMATION requests"
        explode: true
        in: query
        name: invoice-nr
        required: false
        schema:
          type: string
        style: form
      - description: Customer order number
        explode: true
        in: query
        name: order-nr
        required: false
        schema:
          type: string
        style: form
      - description: "Sales channel (site or marketplace name) for STOCKSTATE_CHANNEL,\
          \ ORDERSTATE requests"
        explode: true
        in: query
        name: sales-channel
        required: false
        schema:
          $ref: "#/components/schemas/SalesChannel"
        style: form
      responses:
        "200":
          content:
            plain/text:
              schema:
                type: string
            '*/*':
              schema:
                type: string
          description: url to get a response
        "401":
          content:
            plain/text:
              example: Unauthorized
          description: Unauthorized
        "403":
          content:
            plain/text:
              schema:
                type: string
            '*/*':
              schema:
                type: string
          description: Forbidden
      security:
      - jwt: []
      summary: Service request
      tags:
      - create request
      x-accepts:
      - '*/*'
      - plain/text
