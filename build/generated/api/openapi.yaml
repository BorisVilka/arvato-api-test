components:
  schemas:
    Parameter:
      example:
        param-name: param-name
        param-type: "0"
        value: value
      properties:
        value:
          description: parameter value
          type: string
          xml:
            attribute: true
            name: value
        param-name:
          description: parameter name
          type: string
          xml:
            attribute: true
            name: param-name
        param-type:
          description: "parameter type (0 - boolean, 1 - number, 2 - string, 3 - date)"
          enum:
          - "0"
          - "1"
          - "2"
          - "3"
          type: string
          xml:
            attribute: true
            name: param-type
      type: object
    ProductReceive:
      example:
        invoice-nr: invoice-nr
        invoice-date: 2000-01-23T04:56:07.000+00:00
        product-receive-rows:
